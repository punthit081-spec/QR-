<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ภาพเอกสารทะเบียนพาณิชย์</title>
    <style>
      :root {
        --image-ratio: 1024 / 1482;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #e9e9e9;
        font-family: Tahoma, sans-serif;
      }

      .frame {
        width: min(100vw, calc(100vh * var(--image-ratio)));
        aspect-ratio: var(--image-ratio);
        background: #fff;
        overflow: hidden;
      }

      .frame img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <img src="merchant-registration.png" alt="ภาพทะเบียนพาณิชย์" />
    </main>
  </body>
</html>
